services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-network

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network
    environment:
      - TZ=Europe/Kiev
    volumes:
      - .:/app

  worker:
    build: .
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: celery -A celery_app worker --loglevel=info
    networks:
      - app-network
    environment:
      - TZ=Europe/Kiev

  beat:
    build: .
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: celery -A celery_app beat --loglevel=info
    networks:
      - app-network
    environment:
      - TZ=Europe/Kiev

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: